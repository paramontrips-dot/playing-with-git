<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000; /* Deep Black */
            --rose-gold: #E0A9A5; /* Luminous Rose Gold */
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Playfair Display', serif;
        }

        .container-fluid {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .love-text {
            color: var(--rose-gold);
            font-size: 5.5rem;
            font-weight: 400;
            font-style: italic; /* Personal, handwritten feel */
            letter-spacing: 2px;
            z-index: 10;
            text-align: center;
            animation: softGlow 5s ease-in-out infinite;
            cursor: default;
            user-select: none;
        }

        @keyframes softGlow {
            0%, 100% { 
                opacity: 0.7; 
                transform: translateY(0);
                text-shadow: 0 0 15px rgba(224, 169, 165, 0.3);
            }
            50% { 
                opacity: 1; 
                transform: translateY(-5px);
                text-shadow: 0 0 35px rgba(224, 169, 165, 0.7);
            }
        }

        /* Falling Hearts */
        .heart {
            position: absolute;
            background-color: var(--rose-gold);
            opacity: 0.15;
            pointer-events: none;
            /* Creating the heart shape via CSS */
            width: 10px;
            height: 10px;
            transform: rotate(-45deg);
        }

        .heart::after, .heart::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--rose-gold);
            border-radius: 50%;
        }

        .heart::after {
            top: -5px;
            left: 0;
        }

        .heart::before {
            top: 0;
            left: 5px;
        }

        @media (max-width: 768px) {
            .love-text {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <h1 class="love-text">Next date ki eppudu veldham Shraab ?</h1>
    </div>

    <script>
        function createHeart() {
            const container = document.querySelector('.container-fluid');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Randomize size using scale, rotation, and speed
            const scale = Math.random() * 0.8 + 0.3; // subtle variations in size
            const baseRotation = -45; // base rotation for the shape
            const rotationVariation = (Math.random() - 0.5) * 40; // slight sway
            
            heart.style.transform = `rotate(${baseRotation + rotationVariation}deg) scale(${scale})`;
            
            // Randomize start position
            heart.style.top = '-20px'; // Start just off screen
            heart.style.left = Math.random() * 100 + 'vw';
            
            container.appendChild(heart);

            // Animate falling and drifting
            const duration = Math.random() * 6000 + 7000; // slow, dreamy fall
            const horizontalDrift = (Math.random() - 0.5) * 150; // subtle side sway
            
            const animation = heart.animate([
                { top: '-20px', left: heart.style.left, opacity: 0.3 },
                { top: '110vh', left: `calc(${heart.style.left} + ${horizontalDrift}px)`, opacity: 0 }
            ], {
                duration: duration,
                easing: 'linear' // steady fall
            });

            // Clean up when done
            animation.onfinish = () => heart.remove();
        }

        // Generate hearts slowly to maintain elegance
        setInterval(createHeart, 500);
    </script>
</body>
</html>
